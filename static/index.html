<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRL AI Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 p-4 md:p-8 font-sans">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <header class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-gray-900">NRL AI Simulator</h1>
            <p class="text-gray-500 mt-1">Powered by NRL OmniModel</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Sidebar Setup -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 h-fit space-y-4">
                    <h2 class="font-semibold text-lg border-b pb-2 mb-4">Match Setup</h2>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Home Team</label>
                        <select id="homeTeam" class="w-full border border-gray-300 rounded p-2.5 bg-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option>Loading...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Away Team</label>
                        <select id="awayTeam" class="w-full border border-gray-300 rounded p-2.5 bg-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option>Loading...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Venue</label>
                        <select id="venue" class="w-full border border-gray-300 rounded p-2.5 bg-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option>Loading...</option>
                        </select>
                    </div>

                    <div class="pt-4 space-y-3 border-t mt-4">
                        <button type="button" id="btnPredict" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded transition-colors shadow-sm">
                            Predict Outcome
                        </button>
                        <button type="button" id="btnSimulate" class="w-full bg-white hover:bg-gray-50 text-gray-800 font-medium py-2.5 px-4 rounded border border-gray-300 transition-colors shadow-sm">
                            Simulate Play-by-Play
                        </button>
                        <button type="button" id="btnSGM" class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-2.5 px-4 rounded transition-colors shadow-sm">
                            Generate SGM
                        </button>
                    </div>
                </div>

                <!-- Training & Model Management -->
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 h-fit space-y-4">
                    <h2 class="font-semibold text-lg border-b pb-2 mb-4">Model Training</h2>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Epochs</label>
                            <input type="number" id="trainEpochs" value="5" class="w-full border border-gray-300 rounded p-2 bg-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Batch Size</label>
                            <input type="number" id="trainBatch" value="8" class="w-full border border-gray-300 rounded p-2 bg-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Learning Rate</label>
                            <input type="number" step="0.0001" id="trainLr" value="0.001" class="w-full border border-gray-300 rounded p-2 bg-white text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                    </div>
                    
                    <div class="pt-4 space-y-3 border-t mt-4">
                        <button type="button" id="btnTrain" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-4 rounded transition-colors shadow-sm">
                            Train OmniModel
                        </button>
                        <button type="button" id="btnLoad" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-medium py-2.5 px-4 rounded transition-colors shadow-sm">
                            Load .pt Model
                        </button>
                    </div>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="md:col-span-2 space-y-6">
                
                <!-- Output Box -->
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <h2 class="font-semibold text-lg">Results Output</h2>
                    </div>
                    <div id="resultsContent" class="text-sm text-gray-800 font-mono whitespace-pre-wrap h-[500px] overflow-y-auto bg-gray-50 p-4 rounded border border-gray-200">Awaiting action... Select teams and click a button to begin.</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        async function fetchInfo() {
            try {
                const res = await fetch('/api/info');
                const data = await res.json();
                
                const homeSelect = document.getElementById('homeTeam');
                const awaySelect = document.getElementById('awayTeam');
                const venueSelect = document.getElementById('venue');
                
                homeSelect.innerHTML = '';
                awaySelect.innerHTML = '';
                venueSelect.innerHTML = '';

                if (data.teams && data.teams.length > 0) {
                    data.teams.forEach(team => {
                        homeSelect.add(new Option(team, team));
                        awaySelect.add(new Option(team, team));
                    });

                    if(data.teams.length > 1) {
                        awaySelect.selectedIndex = 1;
                    }
                } else {
                    homeSelect.add(new Option("No teams found", ""));
                }

                if (data.venues && data.venues.length > 0) {
                    data.venues.forEach(venue => {
                        venueSelect.add(new Option(venue, venue));
                    });
                } else {
                    venueSelect.add(new Option("No venues found", ""));
                }
            } catch (err) {
                console.error("Failed to load info", err);
                document.getElementById('resultsContent').textContent = "Error loading teams. Is the API running?";
            }
        }

        function getReqBody() {
            return {
                home_team: document.getElementById('homeTeam').value,
                away_team: document.getElementById('awayTeam').value,
                venue: document.getElementById('venue').value
            };
        }

        function displayResult(text) {
            document.getElementById('resultsContent').textContent = text;
        }

        async function fetchStream(url, body) {
            const reqOpts = {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            };
            if (body) reqOpts.body = JSON.stringify(body);

            try {
                const res = await fetch(url, reqOpts);
                if (!res.ok) {
                    const err = await res.json();
                    displayResult("Error: " + (err.detail || res.statusText));
                    return;
                }
                
                const isText = res.headers.get("content-type").includes("text/plain");
                const reader = res.body.pipeThrough(new TextDecoderStream()).getReader();
                let buffer = "";
                
                while (true) {
                    const {value, done} = await reader.read();
                    if (done) break;
                    
                    const box = document.getElementById('resultsContent');
                    
                    if (isText) {
                        box.textContent += value;
                        box.scrollTop = box.scrollHeight;
                    } else {
                        buffer += value;
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); // keep last incomplete line
                        
                        for (const line of lines) {
                            if (!line.trim()) continue;
                            try {
                                const data = JSON.parse(line);
                                if (data.type === "thinking") {
                                    box.textContent += `[AI Thinking] ${data.content}\n`;
                                } else if (data.type === "play") {
                                    box.textContent += `🏉 ${data.content}\n`;
                                } else if (data.type === "result") {
                                    box.textContent += `\n🎯 Final Result:\n${JSON.stringify(data.content, null, 2)}\n`;
                                }
                                box.scrollTop = box.scrollHeight;
                            } catch (e) {
                                console.error("Parse err", line);
                            }
                        }
                    }
                }
            } catch (err) {
                displayResult("Connection Error: " + err.message);
            }
        }

        document.getElementById('btnPredict').onclick = async () => {
            displayResult("Predicting outcome...\n\n");
            await fetchStream('/api/predict', getReqBody());
        };

        document.getElementById('btnSimulate').onclick = async () => {
            displayResult("Simulating match play-by-play...\n\n");
            await fetchStream('/api/simulate', { ...getReqBody(), plays: 15 });
        };

        document.getElementById('btnSGM').onclick = async () => {
            displayResult("Analyzing match parameters to generate Ladbrokes SGM...\n\n");
            await fetchStream('/api/sgm', getReqBody());
        };

        document.getElementById('btnTrain').onclick = async () => {
            const req = {
                epochs: parseInt(document.getElementById('trainEpochs').value) || 5,
                batch_size: parseInt(document.getElementById('trainBatch').value) || 8,
                learning_rate: parseFloat(document.getElementById('trainLr').value) || 0.001
            };
            displayResult("Initializing remote training cluster...\n");
            await fetchStream('/api/train', req);
            
            const box = document.getElementById('resultsContent');
            box.textContent += "\n\n(Click 'Load .pt Model' to use the new weights)";
            box.scrollTop = box.scrollHeight;
        };

        document.getElementById('btnLoad').onclick = async () => {
            displayResult("Loading compiled OmniModel .pt file...\n");
            await fetchStream('/api/load_model');
        };

        // Initialize on load
        fetchInfo();
    </script>
</body>
</html>
